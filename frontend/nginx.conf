server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # proxy API calls to backend (expect backend on host.docker.internal:8000)
  location /api/ {
    proxy_pass http://host.docker.internal:8000/api/;
    proxy_set_header Host $host;
  }

  location /stream {
    proxy_pass http://host.docker.internal:8000/stream;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_set_header Host $host;
  }
}
